<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>Jenkins CI/CD Demo</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

    <h1>Hello World 👋</h1>

    <table>

        <tr>
            <td>版本 Tag</td>
            <td id="tag">Loading...</td>
        </tr>

        <tr>
            <td>Git 分支</td>
            <td id="branch">Loading...</td>
        </tr>

	<tr>
            <td>Commit ID</td>
            <td id="commit_id">Loading...</td>
        </tr>

        <tr>
            <td>构建时间</td>
            <td id="buildTime">Loading...</td>
        </tr>

        <tr>
            <td>部署环境</td>
            <td id="env">Loading...</td>
        </tr>

    </table>

</div>

<script src="js/app.js"></script>

</body>

</html>
